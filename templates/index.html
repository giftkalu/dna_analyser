<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Translator</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #22c55e; /* Green */
            --accent: #ef4444;  /* Red */
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            border-top: 4px solid var(--accent);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
            text-align: center;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 700;
        }

        textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            color: var(--primary);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        input[type="file"] {
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: #052e16;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #16a34a;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result-container {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        h2#result {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            word-wrap: break-word;
            margin: 0;
            color: var(--text);
        }

        .result-label {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sequence Translator</h1>
    <p class="subtitle">Convert DNA/RNA to Amino Acid Chains</p>

    <label for="sequence">Genetic Sequence</label>
    <textarea id="sequence" rows="8" placeholder="Enter ATGC or AUGC sequence..."></textarea>

    <label for="file">Upload Sequence File</label>
    <input type="file" id="file">

    <button onclick="translateSeq()">Translate Sequence</button>

    <div class="result-container">
        <span class="result-label">Translation Result:</span>
        <h2 id="result">---</h2>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
